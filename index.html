<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Denis Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Denis' Portfolio</h1>
      <nav>
        <ul>
          <li><a href="#about">Sobre Mim</a></li>
          <li><a href="#contact">Contato</a></li>
        </ul>
      </nav>
    </header>

    <section class="plays">
      <div class="play" id="play01">
        <button id="runTest01">Executar Teste 1</button>
        <div id="reportTest01" class="report"></div>
      </div>
      <div class="play" id="play02">
        <button id="runTest02">Executar Teste 2</button>
        <div id="reportTest02" class="report"></div>
      </div>
      <div class="play" id="play03">
        <button id="runTest03">Executar Teste 3</button>
        <div id="reportTest03" class="report"></div>
      </div>
      <button id="runAllTests">Executar Todos os Testes</button>
    </section>

    <div id="loadingBar" class="loading-bar">
      <div id="progress"></div>
    </div>

    <section id="about">
      <h2>Sobre Mim</h2>
      <p>Texto sobre você...</p>
    </section>

    <section id="contact">
      <h2>Contato</h2>
      <p>Formas de entrar em contato...</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
