
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfólio Denis</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Portfólio Técnico - Denis Oliveira Santos</h1>
  </header>

  <main>
    <section>
      <h2>Pentest Plays</h2>

      <div class="play-controls">
        <button onclick="executarTeste('todos')">▶️ Executar Todos os Testes</button>
        <button onclick="executarTeste('play-01')">▶️ Executar Play 01 - Nmap</button>
        <button onclick="executarTeste('play-02')">▶️ Executar Play 02 - Hydra</button>
        <button onclick="executarTeste('play-03')">▶️ Executar Play 03 - SQLMap</button>

      <div id="output-area">
        <div id="loading" style="display:none;">
          <p>⏳ Executando testes... aguarde.</p>
          <img src="https://i.gifer.com/YCZH.gif" width="100" />
        </div>
        <iframe id="relatorio" style="width:100%; height:600px; display:none; border:1px solid #ccc;"></iframe>
      </div>
    </section>
  </main>
<script src="script.js"></script>
