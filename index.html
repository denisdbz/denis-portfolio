<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfólio Técnico - Denis Oliveira Santos</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="matrix.js"></script>
</head>
<body>
  <canvas id="matrixCanvas"></canvas>
  <header>
    <h1>Portfólio Técnico - Denis Oliveira Santos</h1>
    <nav>
      <a href="#play01">Play 01 - Nmap Recon</a>
      <a href="#play02">Play 02 - Hydra DVWA</a>
      <a href="#play03">Play 03 - SQLMap</a>
      <a href="#contato">Entre em Contato</a>
    </nav>
  </header>

  <main>
    <section id="play01">
      <h2>Play 01 - Nmap Recon</h2>
      <button onclick="toggleReport('report-nmap')">Ver Relatório</button>
      <div id="report-nmap" class="report">
        <iframe src="plays/play-01-nmap-recon/relatorio-nmap.html"></iframe>
      </div>
    </section>

    <section id="play02">
      <h2>Play 02 - Hydra DVWA</h2>
      <button onclick="toggleReport('report-hydra')">Ver Relatório</button>
      <div id="report-hydra" class="report">
        <iframe src="plays/play-02-hydra-dvwa/relatorio-hydra.html"></iframe>
      </div>
    </section>

    <section id="play03">
      <h2>Play 03 - SQLMap DVWA</h2>
      <button onclick="toggleReport('report-sqlmap')">Ver Relatório</button>
      <div id="report-sqlmap" class="report">
        <iframe src="plays/play-03-sqlmap-dvwa/relatorio-sqlmap.html"></iframe>
      </div>
    </section>

    <section id="contato">
      <h2>Entre em Contato</h2>
      <p>Email: <a href="mailto:denis@example.com">denis@example.com</a></p>
      <p>GitHub: <a href="https://github.com/denisdbz" target="_blank">denisdbz</a></p>
      <p>LinkedIn: <a href="https://linkedin.com/in/denis" target="_blank">/in/denis</a></p>
    </section>
  </main>

  <script>
    function toggleReport(id) {
      const el = document.getElementById(id);
      el.style.display = el.style.display === "block" ? "none" : "block";
    }
  </script>
</body>
</html>
