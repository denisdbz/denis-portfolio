<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Portfólio Técnico - Denis Oliveira Santos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="matrixCanvas" class="matrix-canvas"></canvas>

  <header>
    <h1 class="matrix-title">Portfólio Técnico</h1>
    <p class="subtitulo">Denis Oliveira Santos</p>
  </header>

  <!-- Seções Play -->
  <section class="play">
    <h2>Play 01 - Nmap Recon</h2>
    <button class="run-btn" onclick="simularExecucao('relatorio-nmap')">Executar</button>
    <div class="loading" id="loading-nmap">Executando...</div>
    <iframe id="relatorio-nmap" src="plays/play-01-nmap-recon/report.html"></iframe>
  </section>

  <section class="play">
    <h2>Play 02 - Hydra vs DVWA</h2>
    <button class="run-btn" onclick="simularExecucao('relatorio-hydra')">Executar</button>
    <div class="loading" id="loading-hydra">Executando...</div>
    <iframe id="relatorio-hydra" src="plays/play-02-hydra-dvwa/report.html"></iframe>
  </section>

  <section class="play">
    <h2>Play 03 - SQLMap vs DVWA</h2>
    <button class="run-btn" onclick="simularExecucao('relatorio-sqlmap')">Executar</button>
    <div class="loading" id="loading-sqlmap">Executando...</div>
    <iframe id="relatorio-sqlmap" src="plays/play-03-sqlmap-dvwa/report.html"></iframe>
  </section>

  <!-- Seção de Contato -->
  <section class="contato">
    <h2>Entre em Contato</h2>
    <p>
      📧 <a href="mailto:dns.qa.eng@gmail.com">dns.qa.eng@gmail.com</a><br>
      📱 <a href="tel:+5511978118097">+55 11 97811-8097</a><br>
      💼 <a href="https://www.linkedin.com/in/denis-oliveira-santos-99a83953" target="_blank">LinkedIn</a><br>
      💻 <a href="https://github.com/denisdbz" target="_blank">GitHub</a>
    </p>
  </section>

  <!-- Scripts -->
  <script>
    function simularExecucao(idIframe) {
      const loading = document.getElementById("loading-" + idIframe.split("-")[1]);
      const iframe = document.getElementById(idIframe);
      iframe.style.display = "none";
      loading.style.display = "block";

      setTimeout(() => {
        loading.style.display = "none";
        iframe.style.display = "block";
      }, 2500);
    }
  </script>
  <script src="matrix.js"></script>
</body>
</html>
